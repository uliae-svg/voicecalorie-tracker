<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Голосовой трекер калорий — скажите что съели, получите КБЖУ" />
  <title>VoiceCalorie — Голосовой трекер питания</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="src/css/main.css" />

  <!-- Запуск: npm run dev -->
</head>
<body>

  <!-- ── Header: бренд + дневные итоги ──────────────────── -->
  <header class="header">
    <div class="brand">
      <span class="brand-icon">◈</span>
      <span class="brand-name">VoiceCalorie</span>
    </div>

    <div class="daily-totals">
      <div class="total-item">
        <span class="total-value" id="totalCalories">0</span>
        <span class="total-label">ккал</span>
      </div>
      <div class="total-divider"></div>
      <div class="total-item">
        <span class="total-value protein" id="totalProtein">0г</span>
        <span class="total-label">белки</span>
      </div>
      <div class="total-divider"></div>
      <div class="total-item">
        <span class="total-value fat" id="totalFat">0г</span>
        <span class="total-label">жиры</span>
      </div>
      <div class="total-divider"></div>
      <div class="total-item">
        <span class="total-value carbs" id="totalCarbs">0г</span>
        <span class="total-label">углев.</span>
      </div>
    </div>

    <button class="reset-btn" id="resetBtn" title="Сбросить дневник за сегодня">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
      </svg>
    </button>
  </header>

  <!-- ── Main: микрофон + результат ─────────────────────── -->
  <main class="main">

    <!-- Mic section -->
    <section class="mic-section">
      <div class="mic-wrapper">
        <button class="mic-btn" id="micBtn" aria-label="Нажмите для распознавания речи">
          <!-- Ripple rings (видны только при listening) -->
          <div class="ripple"></div>
          <div class="ripple"></div>
          <div class="ripple"></div>

          <!-- Иконка микрофона -->
          <div class="mic-icon">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <rect x="9" y="2" width="6" height="13" rx="3"/>
              <path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
              <line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="9"  y1="22" x2="15" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
        </button>
      </div>

      <p class="mic-hint" id="micHint">Нажмите и скажите что вы съели</p>
      <p class="mic-hint mic-hint--sub">например: <em>«борщ 300 грамм»</em> или <em>«два яблока»</em></p>
    </section>

    <!-- Распознанный текст -->
    <div class="transcript-box" id="transcriptBox" style="display:none">
      <div class="transcript-label">Распознано</div>
      <div class="transcript-text" id="transcriptText"></div>
      <div class="transcript-translated" id="transcriptTranslated"></div>
    </div>

    <!-- Загрузка -->
    <div class="loading" id="loading" style="display:none">
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <span class="loading-text">Анализирую состав...</span>
    </div>

    <!-- Карточка с результатом -->
    <div id="resultContainer"></div>

  </main>

  <!-- ── Daily Log ────────────────────────────────────────── -->
  <section class="log-section">
    <div class="log-header">
      <h2 class="log-title">Дневник питания</h2>
      <span class="log-date" id="logDate"></span>
    </div>
    <div class="log-list" id="logList">
      <div class="log-empty">Записей пока нет. Скажите что вы съели!</div>
    </div>
  </section>

  <!-- ES module entry point -->
  <script type="module" src="src/js/main.js"></script>

</body>
</html>
